<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Login - AuthChain</title>
  <script src="https://cdn.jsdelivr.net/npm/ethers@5.7.2/dist/ethers.umd.min.js"></script>
  <style>
    body {
      background: #2c3e50;
      color: #fff;
      font-family: Arial, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
    }
    .form-container {
      background: #34495e;
      padding: 30px;
      border-radius: 10px;
      box-shadow: 0 8px 16px rgba(0,0,0,0.3);
      width: 300px;
    }
    input, button {
      width: 100%;
      padding: 10px;
      margin: 10px 0;
      border: none;
      border-radius: 5px;
    }
    button {
      background: #2980b9;
      color: white;
      font-weight: bold;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div class="form-container">
    <h2>Login</h2>
    <input type="text" placeholder="Username" id="username">
    <input type="password" placeholder="Password" id="password">
    <button onclick="loginUser()">Login</button>
  </div>

  <script>
    async function loginUser() {
      const username = document.getElementById("username").value;
      const password = document.getElementById("password").value;

      if (!window.ethereum) {
        alert("Please install MetaMask!");
        return;
      }

      try {
        const provider = new ethers.providers.Web3Provider(window.ethereum);
        await provider.send("eth_requestAccounts", []);
        const signer = provider.getSigner();
        const address = await signer.getAddress();
        console.log("Connected with address:", address);

        const contractAddress = "0x322Ac02Fb4506E4476b5122A6359d2550C2f6854";
        const contractABI = [
          {
            "inputs": [
              {"internalType": "string", "name": "_password", "type": "string"}
            ],
            "name": "login",
            "outputs": [],
            "stateMutability": "nonpayable",
            "type": "function"
          }
        ];
        const contract = new ethers.Contract(contractAddress, contractABI, signer);

        console.log("Logging in with password:", password);
        const tx = await contract.login(password, { gasLimit: 2000000 });
        console.log("Transaction sent, hash:", tx.hash);
        alert("Waiting for transaction confirmation...");
        await tx.wait();
        alert("Login successful!");

        try {
          const response = await fetch('http://localhost:3000/api/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ userAddress: address })
          });
          const result = await response.json();
          console.log("Backend login log:", result);
        } catch (error) {
          console.error("Error logging login to backend:", error);
        }
      } catch (error) {
        console.error("Login error:", error);
        alert("Login failed: " + (error.message || "Unknown error"));
      }
    }
  </script>
</body>
</html>
